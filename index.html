<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rellotge estil estació suïssa</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    background: #000000;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 3rem 1.5rem 1.5rem;
    box-sizing: border-box;
    min-height: 100vh;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    width: 100%;
    max-width: 340px;
  }
  .col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: 100%;
  }
  .clock-case {
    background: #1c1c1c;
    border-radius: 50%;
    padding: 10px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  #clock {
    width: min(80vw, 253px);
    height: min(80vw, 253px);
    display: block;
  }
  #digital {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
  }
  #dateline {
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: #b5b5b0;
    text-align: center;
  }
  #calHeader {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 14px;
    color: #ffffff;
    text-transform: capitalize;
  }
  #calGrid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    text-align: center;
    font-size: 17px;
    width: 100%;
    color: #ffffff;
  }
  #calGrid div { padding: 7px 0; border-radius: 6px; }
  .dow { font-size: 15px; letter-spacing: 0.5px; color: #8a8a86; font-weight: 600; }
  .today { background: #d0102a; color: #ffffff; font-weight: 600; }

  /* En pantalles més amples, rellotge i calendari es posen en línia */
  @media (min-width: 640px) {
    .wrap {
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      max-width: 640px;
      gap: 3rem;
    }
    .col { width: auto; }
    #calGrid { min-width: 280px; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="col">
    <div class="clock-case">
      <svg id="clock" viewBox="0 0 200 200" role="img" aria-label="Rellotge estil estació suïssa">
        <circle cx="100" cy="100" r="96" fill="#ffffff" stroke="#1c1c1c" stroke-width="2"/>
        <g id="ticks"></g>
        <line id="hourHand" x1="100" y1="118" x2="100" y2="37" stroke="#1c1c1c" stroke-width="8.43" stroke-linecap="butt"/>
        <polygon id="minHand" points="96.07,118 96.07,100 96.33,18 103.68,18 103.93,100 103.93,118" fill="#1c1c1c"/>
        <g id="secGroup">
          <line x1="100" y1="118" x2="100" y2="30" stroke="#d0102a" stroke-width="2"/>
          <circle cx="100" cy="37" r="7" fill="#d0102a"/>
        </g>
        <circle cx="100" cy="100" r="5" fill="#1c1c1c"/>
      </svg>
    </div>
    <div id="digital">--:--:--</div>
  </div>

  <div class="col" style="align-items: stretch;">
    <div id="calHeader">--</div>
    <div id="calGrid"></div>
  </div>

</div>

<script>
(function(){
  var svgNS = "http://www.w3.org/2000/svg";
  var ticks = document.getElementById('ticks');
  for (var i = 0; i < 60; i++) {
    var angle = i * 6 * Math.PI / 180;
    var isHour = i % 5 === 0;
    var r1 = isHour ? 72 : 84;
    var w = isHour ? 6 : 3;
    var len = isHour ? 20 : 8;
    var x1 = 100 + r1 * Math.sin(angle), y1 = 100 - r1 * Math.cos(angle);
    var x2 = 100 + (r1 + len) * Math.sin(angle), y2 = 100 - (r1 + len) * Math.cos(angle);
    var line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', '#1c1c1c');
    line.setAttribute('stroke-width', w);
    ticks.appendChild(line);
  }

  var diesSetmana = ["dl","dt","dc","dj","dv","ds","dg"];
  var diesLlarg = ["diumenge","dilluns","dimarts","dimecres","dijous","divendres","dissabte"];
  var mesos = ["gener","febrer","març","abril","maig","juny","juliol","agost","setembre","octubre","novembre","desembre"];

  function buildCalendar(now) {
    var year = now.getFullYear(), month = now.getMonth(), today = now.getDate();
    document.getElementById('calHeader').textContent = mesos[month] + " " + year;
    var grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    diesSetmana.forEach(function(d){
      var el = document.createElement('div');
      el.textContent = d;
      el.className = 'dow';
      grid.appendChild(el);
    });
    var firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    for (var i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
    for (var d = 1; d <= daysInMonth; d++) {
      var cell = document.createElement('div');
      cell.textContent = d;
      if (d === today) cell.className = 'today';
      grid.appendChild(cell);
    }
  }

  var lastDay = null;
  var lastDigitalSecond = null;

  function frame() {
    var now = new Date();
    var h = now.getHours() % 12, m = now.getMinutes();
    var s = now.getSeconds();
    var ms = now.getMilliseconds();
    var sFrac = s + ms / 1000;

    /* Efecte Stop2Go: la segonera fa la volta en 58s de manera contínua
       i queda aturada als 0/12 durant els 2 segons restants. */
    var sAngle;
    if (sFrac < 58) {
      sAngle = (sFrac / 58) * 360;
    } else {
      sAngle = 360; /* equival a 0, aturada dalt de tot */
    }

    /* La minutera no avança de manera contínua: es manté fixa al minut
       en curs i salta al següent just quan acaba la pausa de la segonera. */
    var mAngle = m * 6;

    /* L'horera es mou de manera contínua i suau, com en un rellotge real. */
    var hAngle = (h + m / 60) * 30;

    document.getElementById('hourHand').setAttribute('transform', 'rotate(' + hAngle + ' 100 100)');
    document.getElementById('minHand').setAttribute('transform', 'rotate(' + mAngle + ' 100 100)');
    document.getElementById('secGroup').setAttribute('transform', 'rotate(' + sAngle + ' 100 100)');

    if (s !== lastDigitalSecond) {
      lastDigitalSecond = s;
      var pad = function(n){ return n < 10 ? '0' + n : n; };
      document.getElementById('digital').textContent = pad(now.getHours()) + ':' + pad(m) + ':' + pad(s);

      if (lastDay !== now.getDate()) {
        lastDay = now.getDate();
        buildCalendar(now);
      }
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
