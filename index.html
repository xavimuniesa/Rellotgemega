<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rellotge cronògraf</title>
<style>
  :root{
    --lume:#dbe6c4;
    --lume-dark:#a9b891;
    --hand:#f0f2ee;
    --arrow:#e6402c;
    --accent:#c7d4a9;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0;
    width:100%;
    min-height:100vh;
    min-height:100dvh;
    background: radial-gradient(circle at 50% 22%, #16181c 0%, #06070a 65%, #000 100%);
    display:flex; align-items:center; justify-content:center;
    font-family:'Helvetica Neue', Arial, sans-serif;
    overflow-x:hidden;
  }
  .stage{
    width:100%;
    max-width:600px;
    margin:0 auto;
    display:flex; flex-direction:column; align-items:center; gap:22px;
    padding:24px 16px 40px;
  }
  .watch-wrap{ width:100%; max-width:460px; }
  svg{
    width:100%; height:auto; display:block;
    filter:drop-shadow(0 25px 45px rgba(0,0,0,.65));
  }
  .caption{
    color:#7d8878; font-size:clamp(10px,3vw,12px); letter-spacing:.16em;
    text-transform:uppercase; opacity:.65; text-align:center;
  }

  .calendar{
    width:100%; max-width:360px;
    background:linear-gradient(180deg,#141516,#0b0c0d);
    border:1px solid #232426;
    border-radius:14px;
    padding:clamp(12px,4vw,16px) clamp(10px,3vw,14px) clamp(14px,4vw,18px);
    box-shadow:0 20px 40px -12px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.03);
  }
  .cal-header{
    text-align:center;
    color:#e6e6e2;
    font-size:clamp(16px,4.6vw,19px);
    letter-spacing:.12em;
    text-transform:uppercase;
    margin-bottom:12px;
    font-weight:700;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,minmax(0,1fr));
    gap:clamp(2px,1vw,4px);
  }
  .cal-dow{
    text-align:center;
    color:#8b9482;
    font-size:clamp(12px,3.6vw,14.5px);
    letter-spacing:.06em;
    font-weight:700;
    padding-bottom:6px;
  }
  .cal-day{
    text-align:center;
    color:#c7ccc2;
    font-size:clamp(15px,4.2vw,18px);
    font-weight:700;
    padding:clamp(4px,1.6vw,6px) 0;
    border-radius:8px;
  }
  .cal-day.empty{ color:transparent; }
  .cal-day.today{
    background:linear-gradient(180deg, var(--accent), #92a578);
    color:#111;
    font-weight:700;
    box-shadow:0 2px 6px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
<div class="stage">
  <div class="watch-wrap">
    <svg id="watchSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="caseGrad" cx="35%" cy="28%" r="75%">
          <stop offset="0%" stop-color="#f1f3f5"/>
          <stop offset="45%" stop-color="#adb4ba"/>
          <stop offset="80%" stop-color="#5c6267"/>
          <stop offset="100%" stop-color="#2b2e31"/>
        </radialGradient>
        <radialGradient id="dialGrad" cx="40%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#1e1f22"/>
          <stop offset="55%" stop-color="#101113"/>
          <stop offset="100%" stop-color="#020203"/>
        </radialGradient>
        <radialGradient id="subGrad" cx="38%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#232427"/>
          <stop offset="60%" stop-color="#18191b"/>
          <stop offset="100%" stop-color="#0a0a0b"/>
        </radialGradient>
        <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#3a3d40"/>
          <stop offset="45%" stop-color="#d8dcdf"/>
          <stop offset="70%" stop-color="#767b7f"/>
          <stop offset="100%" stop-color="#26282a"/>
        </linearGradient>
        <linearGradient id="lumeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="var(--lume)"/>
          <stop offset="100%" stop-color="var(--lume-dark)"/>
        </linearGradient>
        <radialGradient id="pivotGrad" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#f2f2f2"/>
          <stop offset="60%" stop-color="#7d7d7d"/>
          <stop offset="100%" stop-color="#242424"/>
        </radialGradient>
        <radialGradient id="bezelSheen" cx="30%" cy="20%" r="80%">
          <stop offset="0%" stop-color="#2a2a2a"/>
          <stop offset="60%" stop-color="#0c0c0c"/>
          <stop offset="100%" stop-color="#000"/>
        </radialGradient>
        <filter id="concave" x="-50%" y="-50%" width="200%" height="200%">
          <feOffset in="SourceGraphic" dx="1.6" dy="2.2" result="off1"/>
          <feGaussianBlur in="off1" stdDeviation="2.4" result="blur1"/>
          <feComposite operator="out" in="SourceGraphic" in2="blur1" result="inv1"/>
          <feFlood flood-color="#000000" flood-opacity="0.75" result="col1"/>
          <feComposite operator="in" in="col1" in2="inv1" result="shadowDark"/>

          <feOffset in="SourceGraphic" dx="-1" dy="-1.4" result="off2"/>
          <feGaussianBlur in="off2" stdDeviation="1.6" result="blur2"/>
          <feComposite operator="out" in="SourceGraphic" in2="blur2" result="inv2"/>
          <feFlood flood-color="#ffffff" flood-opacity="0.08" result="col2"/>
          <feComposite operator="in" in="col2" in2="inv2" result="shadowLight"/>

          <feMerge>
            <feMergeNode in="SourceGraphic"/>
            <feMergeNode in="shadowDark"/>
            <feMergeNode in="shadowLight"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Steel case -->
      <circle cx="200" cy="200" r="193" fill="url(#caseGrad)"/>
      <circle cx="200" cy="200" r="193" fill="none" stroke="#1b1c1e" stroke-width="1"/>
      <g id="caseFlutes" stroke="#7d8286" stroke-width="1" opacity="0.35"></g>

      <!-- Bezel insert -->
      <circle cx="200" cy="200" r="179" fill="url(#bezelSheen)"/>
      <circle cx="200" cy="200" r="179" fill="none" stroke="#000" stroke-width="1"/>

      <!-- Tachymeter: minor ticks first, then major numbers on top -->
      <g id="tachyMinorTicks" stroke="#666" stroke-width="0.7" opacity="0.75"></g>
      <g id="tachyMajorTicks" stroke="#cfcfcf" stroke-width="1" opacity="0.85"></g>
      <g id="tachyGroup" font-size="10" font-weight="600" fill="#d6d6d6" font-family="Helvetica Neue, Arial, sans-serif"></g>
      <text x="200" y="52" text-anchor="middle" font-size="10" font-weight="700" fill="#e2e2e2" letter-spacing="1.5">TACHYMÈTRE</text>

      <!-- Dial -->
      <circle cx="200" cy="200" r="149" fill="url(#dialGrad)"/>
      <circle cx="200" cy="200" r="149" fill="none" stroke="#000" stroke-width="1"/>

      <!-- Minute ticks -->
      <g id="ticksGroup" stroke="#c9c9c9" stroke-width="1" opacity="0.5"></g>

      <!-- Logo -->
      <text x="200" y="145" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="url(#lumeGrad)" stroke="#050505" stroke-width="0.4">&#937;</text>

      <!-- Hour markers -->
      <g id="markersGroup" fill="url(#lumeGrad)" stroke="#050505" stroke-width="0.6"></g>

      <!-- Subdials -->
      <g id="subLeft">
        <circle cx="140" cy="200" r="35" fill="url(#subGrad)" stroke="#000" stroke-width="1" filter="url(#concave)"/>
        <g id="subLeftTicks" stroke="#8f9a86" stroke-width="0.8"></g>
        <text x="140" y="177" text-anchor="middle" font-size="7.5" fill="#8f9a86">60</text>
        <text x="119" y="205" text-anchor="middle" font-size="7.5" fill="#8f9a86">40</text>
        <text x="161" y="205" text-anchor="middle" font-size="7.5" fill="#8f9a86">20</text>
        <line id="runSecHand" x1="140" y1="200" x2="140" y2="170" stroke="var(--hand)" stroke-width="1.3" stroke-linecap="round"/>
        <polygon id="runSecArrow" points="0,0 0,0 0,0" fill="var(--arrow)"/>
        <circle cx="140" cy="200" r="2.2" fill="#555"/>
      </g>

      <g id="subRight">
        <circle cx="260" cy="200" r="35" fill="url(#subGrad)" stroke="#000" stroke-width="1" filter="url(#concave)"/>
        <g id="subRightTicks" stroke="#8f9a86" stroke-width="0.8"></g>
        <text x="260" y="182" text-anchor="middle" font-size="6.5" letter-spacing="1" fill="#8f9a86">ALTÍMETRE</text>
        <text id="altValue" x="260" y="202" text-anchor="middle" font-size="13" font-weight="700" fill="#dbe6c4">--</text>
        <text x="260" y="215" text-anchor="middle" font-size="6.5" fill="#8f9a86">metres</text>
      </g>

      <g id="subBottom">
        <circle cx="200" cy="259" r="31" fill="url(#subGrad)" stroke="#000" stroke-width="1" filter="url(#concave)"/>
        <g id="subBottomTicks" stroke="#8f9a86" stroke-width="0.8"></g>
        <rect x="187" y="250" width="26" height="19" rx="2" fill="#0a0a0a" stroke="#050505" stroke-width="0.6"/>
        <rect x="188" y="251" width="24" height="17" rx="1.6" fill="#0e0f10"/>
        <rect x="188.5" y="251.5" width="23" height="7" rx="1.4" fill="#1c1d1f" opacity="0.6"/>
        <text id="dateWindowText" x="200" y="265" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="15" font-weight="700" fill="#c7ccc2">12</text>
      </g>

      <!-- Main hands -->
      <g id="hourHand">
        <rect x="-6" y="-76" width="12" height="80" rx="4" fill="url(#lumeGrad)" stroke="#050505" stroke-width="0.7"/>
      </g>
      <g id="minHand">
        <rect x="-4.5" y="-116" width="9" height="120" rx="3.5" fill="url(#lumeGrad)" stroke="#050505" stroke-width="0.7"/>
      </g>
      <g id="secHand">
        <line x1="0" y1="0" x2="0" y2="-118" stroke="var(--hand)" stroke-width="1.8"/>
        <polygon points="-5,-118 5,-118 0,-132" fill="var(--arrow)"/>
      </g>

      <circle cx="200" cy="200" r="6" fill="url(#pivotGrad)"/>

      <ellipse cx="150" cy="118" rx="140" ry="66" fill="rgba(255,255,255,0.045)" transform="rotate(-18 150 118)"/>
    </svg>
  </div>
  <div class="calendar" id="calendarCard">
    <div class="cal-header" id="calHeader"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<script>
(function(){
  const CX = 200, CY = 200;
  const NS = 'http://www.w3.org/2000/svg';

  function polar(angleDeg, r){
    const rad = angleDeg * Math.PI/180;
    return [CX + r*Math.sin(rad), CY - r*Math.cos(rad)];
  }
  function polarFrom(cx, cy, angleDeg, r){
    const rad = angleDeg * Math.PI/180;
    return [cx + r*Math.sin(rad), cy - r*Math.cos(rad)];
  }
  function tangent(angleDeg){
    const rad = angleDeg * Math.PI/180;
    return [Math.cos(rad), Math.sin(rad)];
  }

  // ---- Tachymeter: physically accurate scale ----
  // angle for a given value: value = 3600/t(seconds), one full turn = 60s -> angle = 6*t = 21600/value
  const tachyValues = [60,65,70,75,80,85,90,100,110,120,130,140,150,160,170,180,190,200,225,250,275,300,350,400,500];
  const tachyGroup = document.getElementById('tachyGroup');
  const tachyMajorTicks = document.getElementById('tachyMajorTicks');
  const tachyMinorTicks = document.getElementById('tachyMinorTicks');

  tachyValues.forEach(val=>{
    const angle = 21600/val;
    const [x,y] = polar(angle, 163);
    const t = document.createElementNS(NS,'text');
    t.setAttribute('x', x.toFixed(2));
    t.setAttribute('y', y.toFixed(2));
    t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','middle');
    t.setAttribute('transform', `rotate(${angle.toFixed(2)} ${x.toFixed(2)} ${y.toFixed(2)})`);
    t.textContent = val;
    tachyGroup.appendChild(t);

    const [x1,y1] = polar(angle, 176);
    const [x2,y2] = polar(angle, 171);
    const l = document.createElementNS(NS,'line');
    l.setAttribute('x1',x1.toFixed(2)); l.setAttribute('y1',y1.toFixed(2));
    l.setAttribute('x2',x2.toFixed(2)); l.setAttribute('y2',y2.toFixed(2));
    tachyMajorTicks.appendChild(l);
  });

  // minor ticks: every whole second from 8 to 59 (skip where a major tick already sits)
  const majorAngles = new Set(tachyValues.map(v => Math.round((21600/v)*10)));
  for(let t=8; t<60; t++){
    const angle = 6*t;
    const rounded = Math.round(angle*10);
    if(majorAngles.has(rounded)) continue;
    const [x1,y1] = polar(angle, 176);
    const [x2,y2] = polar(angle, 172.5);
    const l = document.createElementNS(NS,'line');
    l.setAttribute('x1',x1.toFixed(2)); l.setAttribute('y1',y1.toFixed(2));
    l.setAttribute('x2',x2.toFixed(2)); l.setAttribute('y2',y2.toFixed(2));
    tachyMinorTicks.appendChild(l);
  }

  // ---- Case flutes ----
  const caseFlutes = document.getElementById('caseFlutes');
  for(let i=0;i<60;i++){
    const angle = i*6;
    const [x1,y1] = polar(angle, 191);
    const [x2,y2] = polar(angle, 186);
    const l = document.createElementNS(NS,'line');
    l.setAttribute('x1',x1.toFixed(2)); l.setAttribute('y1',y1.toFixed(2));
    l.setAttribute('x2',x2.toFixed(2)); l.setAttribute('y2',y2.toFixed(2));
    caseFlutes.appendChild(l);
  }

  // ---- Minute ticks ----
  const ticksGroup = document.getElementById('ticksGroup');
  for(let i=0;i<60;i++){
    if(i % 5 === 0) continue;
    const angle = i*6;
    const [x1,y1] = polar(angle, 147);
    const [x2,y2] = polar(angle, 140);
    const l = document.createElementNS(NS,'line');
    l.setAttribute('x1',x1.toFixed(2)); l.setAttribute('y1',y1.toFixed(2));
    l.setAttribute('x2',x2.toFixed(2)); l.setAttribute('y2',y2.toFixed(2));
    ticksGroup.appendChild(l);
  }

  // ---- Hour markers (explicit polygons) ----
  const markersGroup = document.getElementById('markersGroup');
  for(let i=0;i<12;i++){
    const angle = i*30;
    const isTwelve = i===0;
    const nearSub = (i===3 || i===6 || i===9);
    const outerR = 138;
    const len = isTwelve ? 24 : (nearSub ? 13 : 20);
    const innerR = outerR - len;
    const hw = (isTwelve ? 4 : 3);
    const [tx,ty] = tangent(angle);
    const [ox,oy] = polar(angle, outerR);
    const [ix,iy] = polar(angle, innerR);
    const p1 = [ox - tx*hw, oy - ty*hw];
    const p2 = [ox + tx*hw, oy + ty*hw];
    const p3 = [ix + tx*hw, iy + ty*hw];
    const p4 = [ix - tx*hw, iy - ty*hw];
    const poly = document.createElementNS(NS,'polygon');
    poly.setAttribute('points', [p1,p2,p3,p4].map(p=>p.map(v=>v.toFixed(2)).join(',')).join(' '));
    markersGroup.appendChild(poly);
  }

  // ---- Subdial tick marks ----
  function drawSubTicks(groupId, cx, cy, r){
    const g = document.getElementById(groupId);
    for(let i=0;i<12;i++){
      const angle = i*30;
      const rad = angle * Math.PI/180;
      const x1 = cx + (r-4)*Math.sin(rad), y1 = cy - (r-4)*Math.cos(rad);
      const x2 = cx + r*Math.sin(rad), y2 = cy - r*Math.cos(rad);
      const l = document.createElementNS(NS,'line');
      l.setAttribute('x1',x1.toFixed(2)); l.setAttribute('y1',y1.toFixed(2));
      l.setAttribute('x2',x2.toFixed(2)); l.setAttribute('y2',y2.toFixed(2));
      g.appendChild(l);
    }
  }
  drawSubTicks('subLeftTicks', 140, 200, 33);
  drawSubTicks('subRightTicks', 260, 200, 33);
  drawSubTicks('subBottomTicks', 200, 259, 29);

  // ---- Live hands ----
  const hourHand = document.getElementById('hourHand');
  const minHand = document.getElementById('minHand');
  const secHand = document.getElementById('secHand');
  const runSecHand = document.getElementById('runSecHand');
  const runSecArrow = document.getElementById('runSecArrow');

  function frame(){
    const now = new Date();
    const s = now.getSeconds() + now.getMilliseconds()/1000;
    const m = now.getMinutes() + s/60;
    const h = (now.getHours()%12) + m/60;

    const secDeg = s*6;
    const minDeg = m*6;
    const hourDeg = h*30;

    hourHand.setAttribute('transform', `translate(${CX} ${CY}) rotate(${hourDeg})`);
    minHand.setAttribute('transform', `translate(${CX} ${CY}) rotate(${minDeg})`);
    secHand.setAttribute('transform', `translate(${CX} ${CY}) rotate(${secDeg})`);

    const [rx, ry] = polarFrom(140, 200, secDeg, 26);
    runSecHand.setAttribute('x2', rx.toFixed(2));
    runSecHand.setAttribute('y2', ry.toFixed(2));
    const [ax,ay] = polarFrom(140, 200, secDeg, 30);
    const [t0x,t0y] = tangent(secDeg);
    const arrowP1 = [ax - t0x*3.2, ay - t0y*3.2];
    const arrowP2 = [ax + t0x*3.2, ay + t0y*3.2];
    const [tipx,tipy] = polarFrom(140, 200, secDeg, 35);
    runSecArrow.setAttribute('points', `${arrowP1.map(v=>v.toFixed(2)).join(',')} ${arrowP2.map(v=>v.toFixed(2)).join(',')} ${tipx.toFixed(2)},${tipy.toFixed(2)}`);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- Date window (inside bottom subdial) ----
  const dateWindowText = document.getElementById('dateWindowText');
  function updateDateWindow(){
    dateWindowText.textContent = new Date().getDate();
  }
  updateDateWindow();
  setInterval(updateDateWindow, 60*1000);

  // ---- Altimeter (right subdial), from device geolocation ----
  const altValue = document.getElementById('altValue');
  if('geolocation' in navigator){
    navigator.geolocation.watchPosition(
      (pos) => {
        const alt = pos.coords.altitude;
        altValue.textContent = (alt === null || alt === undefined) ? 'S/D' : Math.round(alt);
      },
      () => { altValue.textContent = 'S/D'; },
      { enableHighAccuracy:true, maximumAge:5000, timeout:10000 }
    );
  } else {
    altValue.textContent = 'S/D';
  }

  // ---- Month calendar (Monday-Sunday), current day highlighted ----
  const monthNames = ['GENER','FEBRER','MARÇ','ABRIL','MAIG','JUNY','JULIOL','AGOST','SETEMBRE','OCTUBRE','NOVEMBRE','DESEMBRE'];
  const dow = ['DL','DT','DC','DJ','DV','DS','DG'];

  function buildCalendar(){
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const today = now.getDate();

    document.getElementById('calHeader').textContent = `${monthNames[month]} ${year}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    dow.forEach(d=>{
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    const firstDay = new Date(year, month, 1);
    // JS getDay(): 0=Sunday..6=Saturday; convert to Monday-first index (0=Mon..6=Sun)
    let startIdx = (firstDay.getDay() + 6) % 7;
    const daysInMonth = new Date(year, month+1, 0).getDate();

    for(let i=0;i<startIdx;i++){
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      el.textContent = '.';
      grid.appendChild(el);
    }
    for(let d=1; d<=daysInMonth; d++){
      const el = document.createElement('div');
      el.className = 'cal-day' + (d===today ? ' today' : '');
      el.textContent = d;
      grid.appendChild(el);
    }
  }
  buildCalendar();
})();
</script>
</body>
</html>
